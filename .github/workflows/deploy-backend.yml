name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: cd api && npm install

      - name: Run tests
        run: cd api && npm test
        continue-on-error: true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$SERVICE_ID" ]; then
            echo "⚠️  Railway credentials not configured. Skipping Railway deployment."
            echo "Setup instructions: Configure RAILWAY_TOKEN and RAILWAY_SERVICE_ID in GitHub Secrets"
          else
            npm install -g @railway/cli
            railway up --service $SERVICE_ID
          fi
